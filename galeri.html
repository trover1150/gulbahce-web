    <style>
        .gallery-page {
            padding-top: 120px;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f0c 0%, #0d1a12 50%, #0a150f 100%);
        }
        .gallery-page-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #e0ffe5 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gallery-page-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Ferhatlar Galeri Stili - Kart Bazlı */
        .activity-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .activity-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .activity-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(46, 204, 113, 0.5);
            box-shadow: 0 25px 50px rgba(46, 204, 113, 0.2), 0 0 30px rgba(46, 204, 113, 0.1);
        }
        
        .activity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }
        
        .activity-card:hover::before {
            opacity: 1;
        }
        
        .activity-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .activity-card:hover .activity-image {
            transform: scale(1.1);
        }
        
        .activity-content {
            padding: 1.5rem;
            position: relative;
            z-index: 2;
        }
        
        .activity-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 0.8rem;
            letter-spacing: 0.5px;
        }
        
        .activity-description {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }
        
        .activity-arrow {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background: rgba(46, 204, 113, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2ecc71;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 3;
        }
        
        .activity-card:hover .activity-arrow {
            background: #2ecc71;
            color: white;
            transform: rotate(-45deg);
        }
        
        /* Full Width Image Gallery */
        .gallery-full-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 0 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-full-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4/3;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gallery-full-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.3);
        }
        .gallery-full-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .gallery-full-item:hover img {
            transform: scale(1.1);
        }
        .gallery-full-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .back-btn {
            position: fixed;
            top: 100px;
            left: 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.4);
            border-radius: 50px;
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: rgba(46, 204, 113, 0.3);
            transform: translateX(-5px);
        }
        .back-btn::before {
            content: '←';
            font-size: 1.2rem;
        }
        
        /* ========== FERHATLAR STİLİ FOTOĞRAF SLIDER ========== */
        .feature-showcase {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .showcase-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 3rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 30px;
            padding: 2rem;
            overflow: hidden;
        }
        
        @media (max-width: 900px) {
            .showcase-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }
        
        .showcase-slider {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            aspect-ratio: 16/10;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .showcase-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .showcase-slide.active {
            opacity: 1;
        }
        
        .showcase-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .showcase-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        
        .showcase-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .showcase-dot.active {
            background: white;
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }
        
        .showcase-dot:hover {
            background: rgba(255, 255, 255, 0.8);
        }
        
        .showcase-content {
            padding: 1rem;
        }
        
        .showcase-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #2ecc71;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }
        
        .showcase-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }
        
        .showcase-description {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        
        .showcase-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        }
        
        .showcase-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(46, 204, 113, 0.4);
        }
    </style>
